<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Week 1: Understanding What Happened to You | Known + Loved Coaching</title>
<meta name="description" content="Week 1 interactive tool — Understanding What Happened to You. Known + Loved Coaching with Kate."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c:  #8B6914;
  --bg: #FBF5E8;
  --lt: #F5EAD5;
  --brown: #2C2420;
  --mid:   #5A4A40;
  --light: #8A7A70;
  --cream: #FAF7F2;
  --card:  #FFFFFF;
  --border:#E2D9CF;
  --font-display:"Cormorant Garamond",Georgia,serif;
  --font-body:"Jost",sans-serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--cream);color:var(--brown);font-family:var(--font-body);font-weight:400;line-height:1.6;min-height:100vh}
body::before{content:"";position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 40% at 15% 0%,rgba(184,146,74,.07) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 85% 90%,color-mix(in srgb,#8B6914 8%,transparent) 0%,transparent 60%);pointer-events:none}
.wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 20px 80px}

/* Header */
.site-header{text-align:center;padding:40px 0 28px;animation:fadeDown .6s ease both}
.brand{font-family:var(--font-body);font-size:10px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--c);display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:20px}
.brand::before,.brand::after{content:"";flex-shrink:0;display:block;width:24px;height:1px;background:var(--c)}
.phase-tag{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--c);border-radius:40px;padding:4px 14px;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--c);margin-bottom:16px}
h1{font-family:var(--font-display);font-size:clamp(28px,5vw,44px);font-weight:400;line-height:1.15;color:var(--brown);margin-bottom:10px}
.theme{font-size:14px;color:var(--mid);font-style:italic;margin-bottom:10px;font-weight:300}
.scripture-header{font-family:var(--font-display);font-size:16px;color:var(--c);font-style:italic;border-left:3px solid var(--c);padding:8px 14px;background:var(--bg);border-radius:0 8px 8px 0;display:inline-block;margin:0 auto;text-align:left}

/* Card */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:28px;box-shadow:0 4px 28px rgba(44,36,32,.09);margin-bottom:16px;animation:fadeUp .45s ease both}
.card-title{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--c);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title::after{content:"";flex:1;height:1px;background:var(--lt)}

/* Inputs */
input,textarea{font-family:var(--font-body);font-size:13px;color:var(--brown);background:var(--cream);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;outline:none;width:100%;transition:border-color .2s}
input:focus,textarea:focus{border-color:var(--c)}
textarea{resize:vertical;line-height:1.6}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-body);font-size:13px;font-weight:500;border:none;border-radius:40px;padding:10px 22px;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--c);color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:disabled{background:var(--border);color:var(--light);cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--mid)}
.btn-ghost:hover{border-color:var(--c);color:var(--brown)}
.btn-tag{background:var(--cream);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--mid);transition:all .15s;font-family:var(--font-body)}
.btn-tag:hover,.btn-tag.active{background:var(--bg);border-color:var(--c);color:var(--brown);font-weight:600}
.btn-tag.selected{background:var(--c);border-color:var(--c);color:#fff;font-weight:600}

/* Range */
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:var(--border);padding:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--c);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}

/* Footer */
.site-footer{text-align:center;padding:24px 0 8px;font-size:11px;color:var(--light);border-top:1px solid var(--border);margin-top:32px;letter-spacing:.5px}
.site-footer strong{color:var(--c);font-weight:500}

/* Animations */
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <div class="brand">Known + Loved Coaching</div>
    <div class="phase-tag">Phase — Foundation &nbsp;·&nbsp; Week 1 of 12</div>
    <h1>Understanding What Happened to You</h1>
    <p class="theme">Truth-Telling & Sacred Safety</p>
    <div style="display:flex;justify-content:center">
      <div class="scripture-header">"The truth will set you free." — John 8:32</div>
    </div>
  </header>

  <div id="app"></div>

  <footer class="site-footer">
    <strong>Known + Loved Coaching</strong> · knownlovedcoaching.com<br/>
    <span style="margin-top:4px;display:block">"He heals the brokenhearted and binds up their wounds." — Psalm 147:3</span>
  </footer>
</div>
<script>

const C="#8B6914",BG="#FBF5E8",LT="#F5EAD5",BROWN="#2C2420",MID="#5A4A40",LIGHT="#8A7A70",CREAM="#FAF7F2",CARD="#FFF",BORDER="#E2D9CF";
const regions=[{id:"head",label:"Head / Mind"},{id:"throat",label:"Throat / Voice"},{id:"chest",label:"Chest / Heart"},{id:"gut",label:"Gut / Stomach"},{id:"hips",label:"Hips / Pelvis"},{id:"legs",label:"Legs"},{id:"feet",label:"Feet / Ground"}];
let sel=null, intensity={}, sensation={};

function render(){
  document.getElementById("app").innerHTML=`
  <div class="card">
    <div class="card-title">✦ Body Map Check-In</div>
    <p style="color:${MID};font-size:13px;margin-bottom:20px">Click a region to log what you notice there right now. This is your body's wisdom — name it without judgment.</p>
    <div style="display:grid;grid-template-columns:110px 1fr;gap:20px;align-items:start">
      <div style="position:relative">
        <svg viewBox="0 0 100 210" width="110" style="display:block">
          <ellipse cx="50" cy="15" rx="13" ry="13" fill="${sel==='head'?C:BG}" stroke="${C}" stroke-width="1.5" style="cursor:pointer" onclick="pick('head')"/>
          <rect x="39" y="29" width="22" height="8" rx="3" fill="${sel==='throat'?C:BG}" stroke="${C}" stroke-width="1.5" style="cursor:pointer" onclick="pick('throat')"/>
          <rect x="30" y="38" width="40" height="28" rx="5" fill="${sel==='chest'?C:BG}" stroke="${C}" stroke-width="1.5" style="cursor:pointer" onclick="pick('chest')"/>
          <rect x="32" y="67" width="36" height="22" rx="4" fill="${sel==='gut'?C:BG}" stroke="${C}" stroke-width="1.5" style="cursor:pointer" onclick="pick('gut')"/>
          <rect x="30" y="90" width="40" height="18" rx="4" fill="${sel==='hips'?C:BG}" stroke="${C}" stroke-width="1.5" style="cursor:pointer" onclick="pick('hips')"/>
          <rect x="30" y="110" width="16" height="44" rx="4" fill="${sel==='legs'?C:BG}" stroke="${C}" stroke-width="1.5" style="cursor:pointer" onclick="pick('legs')"/>
          <rect x="54" y="110" width="16" height="44" rx="4" fill="${sel==='legs'?C:BG}" stroke="${C}" stroke-width="1.5" style="cursor:pointer" onclick="pick('legs')"/>
          <rect x="30" y="156" width="16" height="13" rx="3" fill="${sel==='feet'?C:BG}" stroke="${C}" stroke-width="1.5" style="cursor:pointer" onclick="pick('feet')"/>
          <rect x="54" y="156" width="16" height="13" rx="3" fill="${sel==='feet'?C:BG}" stroke="${C}" stroke-width="1.5" style="cursor:pointer" onclick="pick('feet')"/>
        </svg>
      </div>
      <div>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">
          ${regions.map(r=>`
            <div onclick="pick('${r.id}')" style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;background:${sel===r.id?BG:CREAM};border:1.5px solid ${sel===r.id?C:BORDER};transition:all .15s">
              <div style="width:8px;height:8px;border-radius:50%;background:${intensity[r.id]>0?C:BORDER};flex-shrink:0"></div>
              <span style="font-size:13px;color:${sel===r.id?BROWN:MID};font-weight:${sel===r.id?'600':'400'}">${r.label}</span>
              ${intensity[r.id]>0?`<span style="margin-left:auto;font-size:11px;color:${C};font-weight:600">Intensity ${intensity[r.id]}/5</span>`:''}
            </div>`).join('')}
        </div>
        ${sel?`
          <div style="background:${BG};border-radius:10px;padding:14px;border:1px solid ${C}44">
            <p style="font-size:12px;font-weight:700;color:${C};margin-bottom:8px">${regions.find(r=>r.id===sel)?.label}</p>
            <label style="font-size:11px;color:${MID};display:block;margin-bottom:4px">Intensity (1–5)</label>
            <input type="range" min="1" max="5" value="${intensity[sel]||1}" oninput="setIntensity(this.value)" style="width:100%;margin-bottom:10px"/>
            <label style="font-size:11px;color:${MID};display:block;margin-bottom:4px">What do you notice here?</label>
            <input value="${(sensation[sel]||'').replace(/"/g,'&quot;')}" oninput="setSensation(this.value)" placeholder="tight, buzzy, hollow, warm…" style="width:100%"/>
          </div>`:'<p style="color:'+LIGHT+';font-size:13px;font-style:italic">← Click a region on the body to begin</p>'}
      </div>
    </div>
  </div>`;
}

function pick(id){sel=id;render();}
function setIntensity(v){if(sel)intensity[sel]=+v;render();}
function setSensation(v){if(sel)sensation[sel]=v;render();}
render();

</script>
</body>
</html>
